{% extends "base.html" %}
{% block title %}Edit Week{% endblock %}
{% block content %}
<div class="wrap" style="max-width:580px;">
  <a href="{{ url_for('teacher.week_detail', slug=week.slug) }}" class="back-link">← {{ week.title }}</a>
  <div class="page-header"><h1>Edit Week Details</h1></div>
  <div class="card" style="padding:28px;">
    <form method="POST">
      <div class="form-group">
        <label class="form-label required">Title</label>
        <input class="form-input" type="text" name="title" value="{{ week.title }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" name="description" rows="2">{{ week.description or '' }}</textarea>
        <p class="form-hint">Shown to students on the home page and week detail page.</p>
      </div>
      <div class="form-group">
        <label class="form-label">Teacher notes (private)</label>
        <textarea class="form-textarea" name="teacher_notes" rows="3" placeholder="Your own notes — not visible to students.">{{ week.teacher_notes or '' }}</textarea>
      </div>
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('teacher.week_detail', slug=week.slug) }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
