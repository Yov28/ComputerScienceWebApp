<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}GCSE CS Quiz{% endblock %} — Pearson Edexcel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e28;
  --surface3: #20253200;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text: #f0f2f7;
  --text-muted: #7a8099;
  --text-faint: #4a5068;
  --accent: #4ade80;
  --accent-dim: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.08);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}
a { color: var(--accent); text-decoration: none; }
a:hover { opacity: 0.8; }
.wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
.wrap-wide { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  background: rgba(13,15,20,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); letter-spacing: -0.02em; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; align-items: center; gap: 6px; }
.nav-link {
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  transition: all 0.15s; border: 1px solid transparent;
}
.nav-link:hover { color: var(--text); background: var(--surface); border-color: var(--border); opacity: 1; }
.nav-link.active { color: var(--text); background: var(--surface2); border-color: var(--border); }
.nav-tag {
  font-size: 11px; font-weight: 600; padding: 3px 8px;
  border-radius: 99px; margin-right: 4px; letter-spacing: 0.05em; text-transform: uppercase;
}
.nav-tag.teacher { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.nav-tag.student { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(74,222,128,0.2); }
.btn-logout { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-muted); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* PAGE HEADER */
.page-header { padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
.page-header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; letter-spacing: -0.02em; margin-bottom: 6px; }
.page-header p { color: var(--text-muted); font-size: 15px; }
.page-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
.card-sm { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; text-decoration: none; }
.btn-primary { background: var(--accent); color: #0d0f14; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.88; color: #0d0f14; }
.btn-secondary { background: transparent; color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--border-hover); background: var(--surface2); opacity: 1; }
.btn-danger { background: transparent; color: var(--red); border-color: rgba(248,113,113,0.3); }
.btn-danger:hover { background: var(--red-dim); border-color: var(--red); opacity: 1; }
.btn-amber { background: transparent; color: var(--amber); border-color: rgba(251,191,36,0.3); }
.btn-amber:hover { background: var(--amber-dim); border-color: var(--amber); opacity: 1; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-lg { padding: 12px 28px; font-size: 15px; }

/* FORMS */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 7px; letter-spacing: 0.02em; }
.form-label.required::after { content: ' *'; color: var(--red); }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 14px; outline: none; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-faint); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select option { background: var(--surface2); }
.form-hint { font-size: 12px; color: var(--text-faint); margin-top: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* BADGES */
.badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.badge-green { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(74,222,128,0.2); }
.badge-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.badge-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
.badge-gray { background: rgba(255,255,255,0.05); color: var(--text-faint); border: 1px solid var(--border); }

/* ALERTS */
.alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 20px; }
.alert-error { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
.alert-success { background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.3); color: var(--accent); }

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.stat-val { font-size: 28px; font-weight: 600; }
.stat-val.green { color: var(--accent); }
.stat-val.red { color: var(--red); }
.stat-val.amber { color: var(--amber); }
.stat-val.blue { color: var(--blue); }

/* TABLE */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 12px 16px; font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); background: var(--surface); }
td { padding: 13px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-faint); }
.empty-state h3 { font-size: 18px; color: var(--text-muted); margin-bottom: 8px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* PROGRESS BAR */
.progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }
.progress-fill.red { background: var(--red); }
.progress-fill.amber { background: var(--amber); }

/* BACK LINK */
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.back-link:hover { color: var(--text); opacity: 1; }

/* SECTION TITLE */
.section-title { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; font-weight: 600; }

/* RESPONSIVE */
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } nav { padding: 0 16px; } .wrap, .wrap-wide { padding: 0 16px 60px; } }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

{% if current_user.is_authenticated %}
<nav>
  <a href="/" class="nav-logo">GCSE<span>.</span>CS</a>
  <div class="nav-links">
    {% if current_user.role == 'teacher' %}
      <span class="nav-tag teacher">Teacher</span>
      <a href="{{ url_for('teacher.dashboard') }}" class="nav-link {% if request.endpoint and 'dashboard' in request.endpoint %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('teacher.students') }}" class="nav-link {% if request.endpoint and 'student' in request.endpoint %}active{% endif %}">Students</a>
      <a href="{{ url_for('teacher.weeks') }}" class="nav-link {% if request.endpoint and 'week' in request.endpoint %}active{% endif %}">Weeks</a>
    {% else %}
      <span class="nav-tag student">Student</span>
      <a href="{{ url_for('student.home') }}" class="nav-link {% if request.endpoint == 'student.home' %}active{% endif %}">Home</a>
      <a href="{{ url_for('student.my_progress') }}" class="nav-link {% if request.endpoint == 'student.my_progress' %}active{% endif %}">My Progress</a>
    {% endif %}
    <form action="{{ url_for('auth.logout') }}" method="get" style="display:inline;">
      <button class="btn-logout">Sign out</button>
    </form>
  </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
