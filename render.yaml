services:
  - type: web
    name: gcse-cs-quiz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gcse-quiz-db
          property: connectionString

databases:
  - name: gcse-quiz-db
    plan: free
